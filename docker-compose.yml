version: "3.8"
services:
  # Laravel Backend Server (Apache PHP-FPM)
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uedcl_backend
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=base64:9wMof55S4f25b+eJm+PjG40x51E28H/lW4kX4bEx/mE=
      - APP_URL=https://ug.arosoft.io
      - FRONTEND_URL=https://ug.arosoft.io
      - SANCTUM_STATEFUL_DOMAINS=ug.arosoft.io
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-uedcl_billing}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-root}
    depends_on:
      - db
    networks:
      - uedcl-net

  # Nginx Reverse Proxy & React Static Server
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=https://ug.arosoft.io/api
    container_name: uedcl_web
    restart: unless-stopped
    ports:
      # Map to host port 8081 since 8080 is taken by Frappe. aaPanel reverse proxy should send web traffic to 127.0.0.1:8081
      - "8081:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - uedcl-net

  # MySQL 8 Database
  db:
    image: mysql:8.0
    container_name: uedcl_database
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=${DB_DATABASE:-uedcl_billing}
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-root}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - uedcl-net

networks:
  uedcl-net:
    driver: bridge

volumes:
  db-data:
    driver: local
